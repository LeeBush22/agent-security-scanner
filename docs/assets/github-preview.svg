<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Security Scanner preview</title>
  <desc id="desc">A terminal-style preview showing Agent Security Scanner findings, rule coverage, and report formats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(64 52)">
    <text x="0" y="0" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">LOCAL-FIRST AI AGENT SECURITY</text>
    <text x="0" y="54" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Agent Security Scanner</text>
    <text x="0" y="92" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="22">Scan AI Agent, MCP, AI coding tool, CI, shell, secrets, and supply-chain risks before release.</text>
  </g>
  <g transform="translate(64 176)" filter="url(#shadow)">
    <rect width="1072" height="360" rx="14" fill="#0B1220" stroke="#334155" stroke-width="2"/>
    <rect width="1072" height="42" rx="14" fill="#111827"/>
    <circle cx="25" cy="21" r="6" fill="#EF4444"/>
    <circle cx="47" cy="21" r="6" fill="#F59E0B"/>
    <circle cx="69" cy="21" r="6" fill="#10B981"/>
    <text x="94" y="27" fill="#E5E7EB" font-family="Consolas, monospace" font-size="16">agent-scan . --format all --lang zh</text>
    <g font-family="Consolas, monospace" font-size="19">
      <text x="32" y="86" fill="#E5E7EB">Agent Security Scanner</text>
      <text x="32" y="120" fill="#38BDF8">Target: ./my-agent-project</text>
      <text x="32" y="154" fill="#A7F3D0">Findings: 72</text>
      <line x1="32" y1="184" x2="1040" y2="184" stroke="#475569"/>
      <text x="32" y="222" fill="#FCA5A5">critical</text>
      <text x="160" y="222" fill="#E5E7EB">SEC034</text>
      <text x="280" y="222" fill="#F8FAFC">Zhipu GLM / Z.ai API key detected</text>
      <text x="880" y="222" fill="#FBBF24">effort: medium</text>
      <text x="32" y="262" fill="#FCA5A5">critical</text>
      <text x="160" y="262" fill="#E5E7EB">AIT011</text>
      <text x="280" y="262" fill="#F8FAFC">Claude Code hook executes a shell command</text>
      <text x="880" y="262" fill="#86EFAC">effort: low</text>
      <text x="32" y="302" fill="#FBBF24">medium</text>
      <text x="160" y="302" fill="#E5E7EB">GHA012</text>
      <text x="280" y="302" fill="#F8FAFC">OIDC cloud trust policy requires verification</text>
      <text x="880" y="302" fill="#FBBF24">effort: medium</text>
    </g>
  </g>
  <g transform="translate(64 566)" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="0" y="-28" width="142" height="38" rx="8" fill="#1E3A8A"/>
    <text x="18" y="-3" fill="#DBEAFE">126 rules</text>
    <rect x="162" y="-28" width="154" height="38" rx="8" fill="#065F46"/>
    <text x="180" y="-3" fill="#D1FAE5">local-first</text>
    <rect x="336" y="-28" width="178" height="38" rx="8" fill="#7C2D12"/>
    <text x="354" y="-3" fill="#FFEDD5">SARIF / PDF</text>
    <rect x="534" y="-28" width="180" height="38" rx="8" fill="#4C1D95"/>
    <text x="552" y="-3" fill="#EDE9FE">English / 中文</text>
  </g>
</svg>
