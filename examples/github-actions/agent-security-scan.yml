name: Agent Security Scanner

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  agent-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanner
        run: python -m pip install .

      - name: Run scanner with SARIF output
        run: agent-scan . --format sarif --output output/machine/agent-scan.sarif --baseline .agent-scan-baseline.json --fail-on high

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: output/machine/agent-scan.sarif
